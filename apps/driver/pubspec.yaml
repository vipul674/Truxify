name: truxify_driver
description: Driver-side Truxify web Flutter app.
publish_to: none

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  firebase_core: ^4.11.0
  firebase_messaging: ^16.4.1
  flutter:
    sdk: flutter
  truxify_shared:
    path: ../../packages/truxify_shared

  supabase_flutter: ^2.9.1
  web_socket_channel: ^3.0.0

  google_fonts: ^8.1.0
  flutter_map: ^8.1.1
  latlong2: ^0.9.1
  http: ^1.6.0
  shared_preferences: ^2.5.5
  intl: ^0.20.2
  url_launcher: ^6.3.2
  geolocator: ^14.0.2
  shimmer: ^3.0.0

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  