name: truxify
description: Truxify customer-side Flutter app.
publish_to: none

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  truxify_shared:
    path: ../../packages/truxify_shared
  supabase_flutter: ^2.8.4
  flutter_map: ^8.3.0
  flutter_map_cancellable_tile_provider: ^3.0.0
  google_fonts: ^8.1.0
  intl: ^0.20.2
  latlong2: ^0.9.1
  http: ^1.2.2
  sqflite: ^2.3.0
  path: ^1.9.0
  connectivity_plus: ^7.1.1
  geocoding: ^4.0.0
  geolocator: ^14.0.2
  shared_preferences: ^2.5.5
  uuid: ^4.5.3
  web_socket_channel: ^3.0.0

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
