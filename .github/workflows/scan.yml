name: Flutter AI Code Analysis

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  ai-analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read
      issues: write

    steps:

      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── 2. Flutter setup ──────────────────────────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Dependencies
        run: flutter pub get

      # ── 3. Flutter analyze ────────────────────────────────────────────────
      - name: Run Flutter Analyze
        run: flutter analyze 2>&1 | tee flutter_analyze.txt || true

      # ── 4. Collect project files ──────────────────────────────────────────
      - name: Collect Project Files
        run: |
          echo "## Flutter Analyze Output" > full_report.txt
          cat flutter_analyze.txt >> full_report.txt
          echo "" >> full_report.txt

          echo "## Project Structure" >> full_report.txt
          find . \
            -not -path './.git/*' \
            -not -path './build/*' \
            -not -path './.dart_tool/*' \
            -not -path './android/*' \
            -not -path './ios/*' \
            -not -path './linux/*' \
            -not -path './windows/*' \
            -not -path './macos/*' \
            | sort >> full_report.txt
          echo "" >> full_report.txt

          echo "## Dart Source Files" >> full_report.txt
          find lib test -name "*.dart" \
            ! -name "*.g.dart" \
            ! -name "*.freezed.dart" \
            ! -name "*.gen.dart" \
            ! -name "*.mocks.dart" \
            2>/dev/null | while read f; do
              echo "" >> full_report.txt
              echo "### FILE: $f" >> full_report.txt
              echo '```dart' >> full_report.txt
              cat "$f" >> full_report.txt
              echo '```' >> full_report.txt
          done

          echo "" >> full_report.txt
          echo "### FILE: pubspec.yaml" >> full_report.txt
          cat pubspec.yaml >> full_report.txt

          # Truncate safely at 55000 bytes
          head -c 55000 full_report.txt > full_report_safe.txt
          mv full_report_safe.txt full_report.txt

          echo "Report size: $(wc -c < full_report.txt) bytes"
          echo "Dart files: $(grep -c '### FILE:' full_report.txt || echo 0)"

      # ── 5. Ensure required labels exist ───────────────────────────────────
      - name: Ensure Labels Exist
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              { name: 'flutter-ai-analysis', color: '0075ca', description: 'Flagged by Flutter AI scanner' },
              { name: 'ai-generated',        color: 'e4e669', description: 'Created by AI analysis'       },
              { name: 'critical',            color: 'd73a4a', description: 'Critical severity'            },
              { name: 'high',                color: 'e99695', description: 'High severity'                },
              { name: 'medium',              color: 'f9d0c4', description: 'Medium severity'              },
              { name: 'low',                 color: 'cfd3d7', description: 'Low severity'                 },
            ];
            for (const label of labels) {
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  ...label,
                });
                console.log(`Created label: ${label.name}`);
              } catch (err) {
                // 422 = label already exists — safe to ignore
                if (err.status !== 422) throw err;
                console.log(`Label already exists: ${label.name}`);
              }
            }

      # ── 6. Try Gemini first, fall back to Groq ────────────────────────────
      - name: AI Analysis
        id: ai_analysis
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          PROJECT_DATA=$(cat full_report.txt)

          PROMPT="You are a senior Flutter/Dart engineer doing a full project audit.

          Analyze this Flutter project thoroughly. Only report REAL issues you can actually see. Do NOT invent problems.

          Review these areas:
          1. Code Quality — dead code, hardcoded values, missing null safety
          2. Project Structure — folder organization, feature separation
          3. Architecture — broken patterns, tight coupling, god widgets/classes
          4. Naming — classes/files not following Dart/Flutter conventions
          5. Performance — unnecessary rebuilds, missing const constructors, heavy build()
          6. Security — hardcoded secrets, insecure HTTP, missing validation
          7. Maintainability — duplicated code, unclear responsibilities

          For EACH real issue found, use this EXACT format (no exceptions):

          ISSUE_START
          title: <short clear title>
          severity: critical|high|medium|low
          category: <Code Quality|Structure|Architecture|Naming|Performance|Security|Maintainability>
          file: <file path or project-wide>
          description: <specific evidence you can see in the code>
          suggestion: <concrete actionable fix>
          extra_label: <choose ONLY one from: bug|enhancement|good first issue|help wanted>
          ISSUE_END

          Guidelines for extra_label:
          - bug: something is broken, incorrect behavior, crash risk, or security hole
          - enhancement: improvement to existing code, performance, or structure
          - good first issue: simple fix, easy for a newcomer (e.g. adding const, renaming)
          - help wanted: complex refactor or architectural change needing significant effort

          After all issues add:
          SUMMARY_START
          <2-3 paragraph honest overall assessment. Say clearly if the code is actually good.>
          SUMMARY_END

          Project data:
          $PROJECT_DATA"

          # ── Try Gemini ────────────────────────────────────────────────────
          echo "Trying Gemini 2.5 Flash..."

          GEMINI_PAYLOAD=$(jq -n --arg text "$PROMPT" \
            '{contents: [{parts: [{text: $text}]}]}')

          GEMINI_STATUS=$(curl -s -w "%{http_code}" -o gemini_response.json \
            --max-time 60 \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=$GEMINI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$GEMINI_PAYLOAD")

          if [ "$GEMINI_STATUS" = "200" ]; then
            AI_TEXT=$(jq -r '.candidates[0].content.parts[0].text // ""' gemini_response.json)
            if [ -n "$AI_TEXT" ]; then
              echo "$AI_TEXT" > ai_analysis.txt
              echo "AI_PROVIDER=Gemini 2.5 Flash" >> "$GITHUB_ENV"
              echo "✅ Gemini succeeded"
              exit 0
            fi
          fi

          echo "Gemini failed (status: $GEMINI_STATUS), switching to Groq..."

          # ── Fallback: Groq (Llama 3.3 70B) ───────────────────────────────
          GROQ_PAYLOAD=$(jq -n --arg text "$PROMPT" \
            '{
              model: "llama-3.3-70b-versatile",
              max_tokens: 4096,
              messages: [{ role: "user", content: $text }]
            }')

          GROQ_STATUS=$(curl -s -w "%{http_code}" -o groq_response.json \
            --max-time 60 \
            "https://api.groq.com/openai/v1/chat/completions" \
            -H "Authorization: Bearer $GROQ_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$GROQ_PAYLOAD")

          if [ "$GROQ_STATUS" = "200" ]; then
            AI_TEXT=$(jq -r '.choices[0].message.content // ""' groq_response.json)
            if [ -n "$AI_TEXT" ]; then
              echo "$AI_TEXT" > ai_analysis.txt
              echo "AI_PROVIDER=Groq (Llama 3.3 70B)" >> "$GITHUB_ENV"
              echo "✅ Groq fallback succeeded"
              exit 0
            fi
          fi

          echo "Both Gemini and Groq failed"
          echo "API_FAILED=true" >> "$GITHUB_ENV"

      # ── 7. Create individual GitHub issues ───────────────────────────────
      - name: Create Individual GitHub Issues
        if: env.API_FAILED != 'true'
        uses: actions/github-script@v7
        env:
          AI_PROVIDER: ${{ env.AI_PROVIDER }}
          COMMIT_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        with:
          script: |
            const fs = require('fs');

            if (!fs.existsSync('ai_analysis.txt')) {
              console.log('No analysis file, skipping.');
              return;
            }

            const analysisText = fs.readFileSync('ai_analysis.txt', 'utf8');
            const issueBlocks  = [...analysisText.matchAll(/ISSUE_START([\s\S]*?)ISSUE_END/g)];
            const provider     = process.env.AI_PROVIDER  || 'AI';
            const commitSha    = process.env.COMMIT_SHA   || 'unknown';
            const repo         = process.env.REPO         || '';
            const runId        = process.env.RUN_ID       || '';

            // Valid extra labels that already exist in the repo
            const validExtraLabels = ['bug', 'enhancement', 'good first issue', 'help wanted'];

            // ── Build a fingerprint from file + category + severity ────────
            // Stable across AI title rephrasing
            const makeFingerprint = (file, category, severity) =>
              `${file}::${category}::${severity}`.toLowerCase().trim();

            // ── Extract fingerprint from an existing issue body ────────────
            const extractFingerprint = body => {
              const m = body.match(/<!--\s*fp:([^>]+)-->/);
              return m ? m[1].trim() : null;
            };

            // ── No issues found at all: auto-close everything ─────────────
            if (issueBlocks.length === 0) {
              console.log('No issues found — code is clean. Closing all open AI issues.');
              const existing = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                state: 'open',
                labels: 'flutter-ai-analysis',
                per_page: 100,
              });
              for (const issue of existing.data) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  issue_number: issue.number,
                  body: `✅ No issues detected in the latest scan on \`${commitSha}\`. Code looks clean — closing automatically.\n\n_Scanned by ${provider}_`,
                });
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  issue_number: issue.number,
                  state: 'closed',
                });
              }
              return;
            }

            const sevEmoji = { critical: '🔴', high: '🟠', medium: '🟡', low: '🔵' };

            // ── Parse all issues from AI response ─────────────────────────
            const parsed = issueBlocks.map(block => {
              const t   = block[1];
              const get = k => {
                const m = t.match(new RegExp(`${k}:\\s*(.+)`));
                return m ? m[1].trim() : 'Unknown';
              };
              const sev        = get('severity').toLowerCase();
              const extraRaw   = get('extra_label').toLowerCase();
              const extraLabel = validExtraLabels.includes(extraRaw) ? extraRaw : null;
              const file       = get('file');
              const category   = get('category');
              return {
                title:       get('title'),
                severity:    sev,
                category,
                file,
                description: get('description'),
                suggestion:  get('suggestion'),
                extraLabel,
                fingerprint: makeFingerprint(file, category, sev),
              };
            });

            // ── Fetch all open AI issues ───────────────────────────────────
            const openIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              state: 'open',
              labels: 'flutter-ai-analysis',
              per_page: 100,
            });

            // ── Extract fingerprints from open issues ──────────────────────
            // Each open issue has a hidden <!-- fp:... --> comment in its body
            const openFingerprints = new Map(); // fingerprint -> issue
            for (const issue of openIssues.data) {
              const fp = extractFingerprint(issue.body || '');
              if (fp) openFingerprints.set(fp, issue);
            }

            // New scan fingerprints
            const newFingerprints = new Set(parsed.map(p => p.fingerprint));

            // ── Step 1: Flag issues not seen in this scan (don't auto-close)
            // Only leave a comment so the developer can verify and close manually
            for (const [fp, openIssue] of openFingerprints) {
              if (!newFingerprints.has(fp)) {
                // Check if we already left a "not detected" comment recently
                // to avoid spamming the same comment on every push
                const comments = await github.rest.issues.listComments({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  issue_number: openIssue.number,
                  per_page: 10,
                });
                const alreadyFlagged = comments.data.some(c =>
                  c.body.includes('not detected in the latest scan')
                );
                if (!alreadyFlagged) {
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo:  context.repo.repo,
                    issue_number: openIssue.number,
                    body: `⚠️ This issue was **not detected** in the latest scan on \`${commitSha}\`.\n\nPlease verify if the problem is actually fixed and close this issue manually if resolved.\n\n_Scanned by ${provider}_`,
                  });
                  console.log(`Flagged for manual review: ${openIssue.title}`);
                } else {
                  console.log(`Already flagged, skipping comment: ${openIssue.title}`);
                }
              }
            }

            // ── Step 2: Create new issues, skip if fingerprint already open
            let created = 0;
            let skipped = 0;

            for (const issue of parsed) {
              // Skip if an open issue with the same fingerprint already exists
              if (openFingerprints.has(issue.fingerprint)) {
                console.log(`Skipping — fingerprint already open: ${issue.fingerprint}`);
                skipped++;
                continue;
              }

              const emoji      = sevEmoji[issue.severity] || '⚪';
              const issueTitle = issue.title;

              // Base labels + extra label if AI provided a valid one
              const labels = ['flutter-ai-analysis', 'ai-generated', issue.severity];
              if (issue.extraLabel) labels.push(issue.extraLabel);

              const body = [
                // Hidden fingerprint — used for stable matching across scans
                // DO NOT remove this comment
                `<!-- fp:${issue.fingerprint} -->`,
                ``,
                `## ${emoji} ${issue.title}`,
                ``,
                `> ⚠️ AI-generated suggestion — verify before acting.`,
                ``,
                `| | |`,
                `|---|---|`,
                `| **Severity** | \`${issue.severity.toUpperCase()}\` |`,
                `| **Category** | \`${issue.category}\` |`,
                `| **File** | \`${issue.file}\` |`,
                `| **Commit** | \`${commitSha}\` |`,
                `| **Analyzed by** | ${provider} |`,
                `| **Workflow run** | [View logs](https://github.com/${repo}/actions/runs/${runId}) |`,
                ``,
                `---`,
                ``,
                `### 🐛 Problem`,
                issue.description,
                ``,
                `---`,
                ``,
                `### 💡 Suggested Fix`,
                issue.suggestion,
                ``,
                `---`,
                ``,
                `### ✅ How to close this`,
                `Fix the problem above and push to main. The next scan will flag this issue for manual review if it no longer detects the problem. You can then close it manually.`,
                ``,
                `_Generated: ${new Date().toUTCString()}_`,
              ].join('\n');

              await github.rest.issues.create({
                owner:  context.repo.owner,
                repo:   context.repo.repo,
                title:  issueTitle,
                body:   body,
                labels: labels,
              });

              created++;
              console.log(`Created: ${issueTitle} [fp: ${issue.fingerprint}] [labels: ${labels.join(', ')}]`);

              // Respect GitHub API rate limit
              await new Promise(r => setTimeout(r, 500));
            }

            console.log(`Done — Created: ${created}, Skipped (already open): ${skipped}`);