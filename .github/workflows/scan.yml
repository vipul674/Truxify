name: Truxify Multi-Layer Code Analysis

# ═══════════════════════════════════════════════════════════════════════════════
# PIPELINE ARCHITECTURE
#
#   detect-changes     → determines which apps need analysis
#   analyze-customer   → runs composite action for customer app  (parallel)
#   analyze-driver     → runs composite action for driver app    (parallel)
#   save-hashes        → single atomic commit of both hash files (no race)
#
# All analysis logic lives in .github/actions/analyze-app/action.yml
# Both apps use IDENTICAL analysis code — no drift, no duplication.
#
# LAYERS (inside the composite action):
#   1a — flutter analyze        : type errors, null-safety, lints
#   1b — Semgrep OSS            : pattern rules, anti-patterns, security
#   1c — Dart Code Metrics      : complexity, naming, structure
#   2  — AI (Gemini + Groq + OpenRouter Fallback) : PARALLEL per file, merged with dedup
#   3  — Dedup engine           : fp5 fingerprint, zero duplicates
#
# FINGERPRINT v5 = sha256(app | file | code | line)
#   Source-independent: same bug → one issue, regardless of which tool found it.
#   Backward-compatible: migrates existing fp4 issues via body parsing.
# ═══════════════════════════════════════════════════════════════════════════════

on:
  workflow_dispatch:
    inputs:
      app:
        description: 'Which app to analyze'
        required: true
        default: both
        type: choice
        options: [both, customer, driver]
      force:
        description: 'Force re-analysis even if code unchanged'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

concurrency:
  group: truxify-analysis
  cancel-in-progress: false

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — detect which apps changed
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  detect-changes:
    name: Detect changed apps
    runs-on: ubuntu-latest
    outputs:
      customer: ${{ steps.changes.outputs.customer }}
      driver: ${{ steps.changes.outputs.driver }}

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 2

      - name: Detect changed apps
        id: changes
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "customer=true" >> "$GITHUB_OUTPUT"
            echo "driver=true"   >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            INPUT="${{ github.event.inputs.app }}"
            case "$INPUT" in
              both)     echo "customer=true"  >> "$GITHUB_OUTPUT"; echo "driver=true"  >> "$GITHUB_OUTPUT" ;;
              customer) echo "customer=true"  >> "$GITHUB_OUTPUT"; echo "driver=false" >> "$GITHUB_OUTPUT" ;;
              driver)   echo "customer=false" >> "$GITHUB_OUTPUT"; echo "driver=true"  >> "$GITHUB_OUTPUT" ;;
            esac
            exit 0
          fi

          CHANGED=""
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            CHANGED=$(git diff --name-only HEAD~1 HEAD)
          else
            CHANGED=$(git ls-files)
          fi

          echo "$CHANGED" | grep -q "^apps/customer/" \
            && echo "customer=true"  >> "$GITHUB_OUTPUT" \
            || echo "customer=false" >> "$GITHUB_OUTPUT"

          echo "$CHANGED" | grep -q "^apps/driver/" \
            && echo "driver=true"  >> "$GITHUB_OUTPUT" \
            || echo "driver=false" >> "$GITHUB_OUTPUT"

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2 — analyze customer app (parallel with driver)
  # ─────────────────────────────────────────────────────────────────────────────
  analyze-customer:
    name: Analyze customer app
    needs: detect-changes
    if: needs.detect-changes.outputs.customer == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      issues: write
      security-events: write
    outputs:
      hash: ${{ steps.analyze.outputs.hash }}
      changed: ${{ steps.analyze.outputs.changed }}

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run analysis pipeline
        id: analyze
        uses: ./.github/actions/analyze-app
        with:
          app-name: customer
          app-label: customer-app
          theme-desc: 'peacock green theme, #00897B = kPrimary'
          gemini-api-key: ${{ secrets.GEMINI_API_KEY }}
          groq-api-key: ${{ secrets.GROQ_API_KEY }}
          openrouter-api-key: ${{ secrets.OPENROUTER_API_KEY }}
          force: ${{ github.event_name == 'schedule' || github.event.inputs.force == 'true' }}

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 3 — analyze driver app (parallel with customer)
  # ─────────────────────────────────────────────────────────────────────────────
  analyze-driver:
    name: Analyze driver app
    needs: detect-changes
    if: needs.detect-changes.outputs.driver == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      issues: write
      security-events: write
    outputs:
      hash: ${{ steps.analyze.outputs.hash }}
      changed: ${{ steps.analyze.outputs.changed }}

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run analysis pipeline
        id: analyze
        uses: ./.github/actions/analyze-app
        with:
          app-name: driver
          app-label: driver-app
          theme-desc: 'maroon theme, #8B1A1A = kPrimary'
          gemini-api-key: ${{ secrets.GEMINI_API_KEY }}
          groq-api-key: ${{ secrets.GROQ_API_KEY }}
          openrouter-api-key: ${{ secrets.OPENROUTER_API_KEY }}
          force: ${{ github.event_name == 'schedule' || github.event.inputs.force == 'true' }}

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 4 — save hashes (single atomic commit, no git push race condition)
  # ─────────────────────────────────────────────────────────────────────────────
  save-hashes:
    name: Save source hashes
    needs: [analyze-customer, analyze-driver]
    if: >-
      always() &&
      (needs.analyze-customer.result == 'success' || needs.analyze-driver.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7

      - name: Write hash files and commit
        run: |
          set -euo pipefail
          mkdir -p .github
          CHANGES=false

          CUST_RESULT="${{ needs.analyze-customer.result }}"
          CUST_CHANGED="${{ needs.analyze-customer.outputs.changed }}"
          CUST_HASH="${{ needs.analyze-customer.outputs.hash }}"
          if [ "$CUST_RESULT" = "success" ] && [ "$CUST_CHANGED" = "true" ] \
             && [ -n "$CUST_HASH" ] && [ "$CUST_HASH" != "empty" ]; then
            echo "$CUST_HASH" > .github/last_scan_hash_customer.txt
            echo "Customer hash: $CUST_HASH"
            CHANGES=true
          fi

          DRV_RESULT="${{ needs.analyze-driver.result }}"
          DRV_CHANGED="${{ needs.analyze-driver.outputs.changed }}"
          DRV_HASH="${{ needs.analyze-driver.outputs.hash }}"
          if [ "$DRV_RESULT" = "success" ] && [ "$DRV_CHANGED" = "true" ] \
             && [ -n "$DRV_HASH" ] && [ "$DRV_HASH" != "empty" ]; then
            echo "$DRV_HASH" > .github/last_scan_hash_driver.txt
            echo "Driver hash: $DRV_HASH"
            CHANGES=true
          fi

          if [ "$CHANGES" = "true" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .github/last_scan_hash_*.txt
            git diff --staged --quiet || git commit -m "chore: update scan hashes [skip ci]"
            git pull --rebase || true
            git push
            echo "Hash files committed and pushed"
          else
            echo "No hash files to update"
          fi
