name: PR Merge Comment

on:
  pull_request_target:
    types: [closed]

permissions:
  pull-requests: write

jobs:
  merged_comment:
    name: Post Merge Comment
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Post merge comment
        uses: actions/github-script@v9
        with:
          script: |
            const comment = `🎉 Thank you for your contribution!

            Your pull request has been merged successfully. We appreciate your work and look forward to your future contributions. 🚀`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: comment
            });
