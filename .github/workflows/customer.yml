name: Customer App AI Analysis

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'apps/customer/**'
  workflow_dispatch:

# ── Prevent overlapping runs with driver workflow ────────────────────────────
concurrency:
  group: truxify-ai-analysis
  cancel-in-progress: false

jobs:
  ai-analyze-customer:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: write
      issues: write

    steps:

      # ── 1. Checkout ────────────────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── 2. Flutter setup ───────────────────────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Customer App Dependencies
        working-directory: apps/customer
        run: flutter pub get

      # ── 3. Flutter analyze ─────────────────────────────────────────────
      - name: Analyze Customer App
        working-directory: apps/customer
        run: flutter analyze 2>&1 |
          tee "$GITHUB_WORKSPACE/customer_analyze.txt" || true

      # ── 4. Collect customer files ──────────────────────────────────────
      - name: Collect Customer App Files
        run: |
          echo "# Truxify — Customer App Analysis" > report.txt
          echo "" >> report.txt

          echo "## Flutter Analyze Output" >> report.txt
          cat customer_analyze.txt >> report.txt
          echo "" >> report.txt

          echo "## Project Structure (customer)" >> report.txt
          find apps/customer \
            -not -path '*/build/*' \
            -not -path '*/.dart_tool/*' \
            -not -path '*/android/*' \
            -not -path '*/ios/*' \
            -not -path '*/linux/*' \
            -not -path '*/windows/*' \
            -not -path '*/macos/*' \
            | sort >> report.txt
          echo "" >> report.txt

          echo "## pubspec.yaml" >> report.txt
          cat apps/customer/pubspec.yaml >> report.txt
          echo "" >> report.txt

          echo "## Dart Files" >> report.txt
          find apps/customer/lib apps/customer/test \
            -name "*.dart" \
            ! -name "*.g.dart" \
            ! -name "*.freezed.dart" \
            ! -name "*.gen.dart" \
            2>/dev/null | sort | while read f; do
              echo "" >> report.txt
              echo "### FILE: $f" >> report.txt
              echo '```dart' >> report.txt
              cat "$f" >> report.txt
              echo '```' >> report.txt
          done

          # ── Cap at 28000 bytes to stay within Groq free tier ──────────
          head -c 28000 report.txt > report_safe.txt
          mv report_safe.txt report.txt

          echo "Report size: $(wc -c < report.txt) bytes"
          echo "Dart files: $(grep -c '### FILE:' report.txt || echo 0)"

      # ── 5. Check source hash ───────────────────────────────────────────
      - name: Check Source Hash
        id: source_hash
        run: |
          HASH=$(
            (
              find apps/customer/lib apps/customer/test \
                -name "*.dart" \
                ! -name "*.g.dart" \
                ! -name "*.freezed.dart" \
                ! -name "*.gen.dart" \
                2>/dev/null | sort | xargs cat
              cat apps/customer/pubspec.yaml 2>/dev/null || true
            ) | sha256sum | cut -d' ' -f1
          )
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"
          echo "Source hash: $HASH"

          HASH_FILE=".github/last_scan_hash_customer.txt"
          if [ -f "$HASH_FILE" ]; then
            LAST=$(cat "$HASH_FILE")
            if [ "$HASH" = "$LAST" ]; then
              echo "changed=false" >> "$GITHUB_OUTPUT"
              echo "Customer app unchanged — skipping"
            else
              echo "changed=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # ── 6. Ensure labels exist ─────────────────────────────────────────
      - name: Ensure Labels Exist
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              { name: 'flutter-ai-analysis', color: '0075ca',
                description: 'Flagged by Flutter AI scanner' },
              { name: 'ai-generated',        color: 'e4e669',
                description: 'Created by AI analysis' },
              { name: 'critical',            color: 'd73a4a',
                description: 'Critical severity' },
              { name: 'high',                color: 'e99695',
                description: 'High severity' },
              { name: 'medium',              color: 'f9d0c4',
                description: 'Medium severity' },
              { name: 'low',                 color: 'cfd3d7',
                description: 'Low severity' },
              { name: 'flutter',             color: '54C5F8',
                description: 'Flutter related' },
              { name: 'customer-app',        color: '0052cc',
                description: 'Customer app' },
            ];
            for (const label of labels) {
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  ...label,
                });
                console.log(`Created: ${label.name}`);
              } catch (err) {
                if (err.status !== 422) throw err;
                console.log(`Exists: ${label.name}`);
              }
            }

      # ── 7. AI Analysis ─────────────────────────────────────────────────
      - name: AI Analysis
        id: ai_analysis
        if: steps.source_hash.outputs.changed == 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          PROJECT_DATA=$(cat report.txt)

          PROMPT="You are a senior Flutter engineer auditing
          the Truxify customer Flutter app (apps/customer).

          This is a freight marketplace customer-facing app.
          Analyze ONLY the files provided. Do NOT invent
          problems that are not visible in the code.

          Review these areas:
          1. Code Quality — dead code, hardcoded values,
             missing null safety
          2. Project Structure — folder organization,
             feature separation
          3. Architecture — broken patterns, tight coupling,
             god widgets/classes
          4. Naming — files not following Dart conventions
          5. Performance — unnecessary rebuilds, missing
             const constructors, heavy build() methods
          6. Security — hardcoded secrets, insecure HTTP,
             missing input validation
          7. Maintainability — duplicated code, unclear
             widget responsibilities

          For EACH real issue use this EXACT format:

          ISSUE_START
          title: [CODE:slug] Short description
          severity: critical|high|medium|low
          category: <full category name>
          file: <file path or project-wide>
          layer: flutter
          description: <specific evidence seen in the code>
          suggestion: <concrete actionable fix>
          extra_label: <bug|enhancement|good first issue|help wanted>
          ISSUE_END

          CODE options:
          CQ=Code Quality, ST=Structure, AR=Architecture,
          NA=Naming, PE=Performance, SE=Security, MA=Maintainability

          FILE_SLUG: filename only, no path, no extension.
          Use 'project' if project-wide.

          After all issues add:
          SUMMARY_START
          <2-3 paragraph honest assessment of the customer
          app. Be specific. Say clearly if it is well written.>
          SUMMARY_END

          Project data:
          $PROJECT_DATA"

          echo "Trying Gemini 2.5 Flash..."
          GEMINI_PAYLOAD=$(jq -n --arg text "$PROMPT" \
            '{contents: [{parts: [{text: $text}]}]}')

          GEMINI_STATUS=$(curl -s -w "%{http_code}" \
            -o gemini_response.json \
            --max-time 90 \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-04-17:generateContent?key=$GEMINI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$GEMINI_PAYLOAD")

          echo "Gemini status: $GEMINI_STATUS"

          if [ "$GEMINI_STATUS" = "200" ]; then
            AI_TEXT=$(jq -r \
              '.candidates[0].content.parts[0].text // ""' \
              gemini_response.json)
            if [ -n "$AI_TEXT" ]; then
              echo "$AI_TEXT" > ai_analysis.txt
              echo "AI_PROVIDER=Gemini 2.5 Flash" >> "$GITHUB_ENV"
              echo "Gemini succeeded"
              exit 0
            fi
          fi

          echo "Gemini failed (status: $GEMINI_STATUS), trying Groq..."
          cat gemini_response.json

          GROQ_PAYLOAD=$(jq -n --arg text "$PROMPT" \
            '{
              model: "llama-3.3-70b-versatile",
              max_tokens: 4096,
              messages: [{role:"user", content:$text}]
            }')

          GROQ_STATUS=$(curl -s -w "%{http_code}" \
            -o groq_response.json \
            --max-time 90 \
            "https://api.groq.com/openai/v1/chat/completions" \
            -H "Authorization: Bearer $GROQ_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$GROQ_PAYLOAD")

          echo "Groq status: $GROQ_STATUS"

          if [ "$GROQ_STATUS" = "200" ]; then
            AI_TEXT=$(jq -r \
              '.choices[0].message.content // ""' \
              groq_response.json)
            if [ -n "$AI_TEXT" ]; then
              echo "$AI_TEXT" > ai_analysis.txt
              echo "AI_PROVIDER=Groq (Llama 3.3 70B)" >> "$GITHUB_ENV"
              echo "Groq succeeded"
              exit 0
            fi
          fi

          echo "Both APIs failed"
          cat groq_response.json
          echo "API_FAILED=true" >> "$GITHUB_ENV"

      # ── 8. Create GitHub Issues ────────────────────────────────────────
      - name: Create GitHub Issues
        if: >
          env.API_FAILED != 'true' &&
          steps.source_hash.outputs.changed == 'true'
        uses: actions/github-script@v7
        env:
          AI_PROVIDER: ${{ env.AI_PROVIDER }}
          COMMIT_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('ai_analysis.txt')) {
              console.log('No analysis file.');
              return;
            }

            const analysisText =
              fs.readFileSync('ai_analysis.txt', 'utf8');
            const issueBlocks = [
              ...analysisText.matchAll(
                /ISSUE_START([\s\S]*?)ISSUE_END/g)
            ];

            const provider  = process.env.AI_PROVIDER || 'AI';
            const commitSha = process.env.COMMIT_SHA  || 'unknown';
            const repo      = process.env.REPO        || '';
            const runId     = process.env.RUN_ID      || '';

            const validExtraLabels = [
              'bug', 'enhancement',
              'good first issue', 'help wanted'
            ];

            const makeFingerprint = title => {
              const m = title.match(/\[([A-Z]{2}:[a-z0-9_]+)\]/);
              return m
                ? `customer:${m[1].toLowerCase()}`
                : `customer:${title.toLowerCase()
                    .replace(/[^a-z0-9\s]/g, '')
                    .replace(/\s+/g, ' ').trim()}`;
            };

            const extractFingerprint = body => {
              const m = body.match(/<!--\s*fp:([^>]+)-->/);
              return m ? m[1].trim() : null;
            };

            if (issueBlocks.length === 0) {
              console.log('No issues found — code looks clean.');
              return;
            }

            const sevEmoji = {
              critical: '🔴', high: '🟠',
              medium: '🟡', low: '🔵'
            };

            const parsed = issueBlocks.map(block => {
              const t = block[1];
              const get = k => {
                const m = t.match(new RegExp(`${k}:\\s*(.+)`));
                return m ? m[1].trim() : 'Unknown';
              };
              const sev      = get('severity').toLowerCase();
              const extraRaw = get('extra_label').toLowerCase();
              return {
                title:       get('title'),
                severity:    sev,
                category:    get('category'),
                file:        get('file'),
                description: get('description'),
                suggestion:  get('suggestion'),
                extraLabel:  validExtraLabels.includes(extraRaw)
                               ? extraRaw : null,
                fingerprint: makeFingerprint(get('title')),
              };
            });

            const allIssues = await github.paginate(
              github.rest.issues.listForRepo, {
                owner:    context.repo.owner,
                repo:     context.repo.repo,
                state:    'all',
                labels:   'flutter-ai-analysis',
                per_page: 100,
              }
            );

            const existingFPs = new Set();
            for (const issue of allIssues) {
              const fp = extractFingerprint(issue.body || '');
              if (fp) existingFPs.add(fp);
            }

            let created = 0, skipped = 0;

            for (const issue of parsed) {
              if (existingFPs.has(issue.fingerprint)) {
                console.log(`Skip (duplicate): ${issue.fingerprint}`);
                skipped++;
                continue;
              }

              const emoji = sevEmoji[issue.severity] || '⚪';
              const labels = [
                'flutter-ai-analysis',
                'ai-generated',
                'flutter',
                'customer-app',
                issue.severity,
              ];
              if (issue.extraLabel) labels.push(issue.extraLabel);

              const body = [
                `<!-- fp:${issue.fingerprint} -->`,
                ``,
                `## ${emoji} ${issue.title}`,
                ``,
                `> ⚠️ AI-generated suggestion — verify before acting.`,
                ``,
                `| | |`,
                `|---|---|`,
                `| **App** | \`customer\` |`,
                `| **Severity** | \`${issue.severity.toUpperCase()}\` |`,
                `| **Category** | \`${issue.category}\` |`,
                `| **File** | \`${issue.file}\` |`,
                `| **Commit** | \`${commitSha}\` |`,
                `| **Analyzed by** | ${provider} |`,
                `| **Workflow run** | [View logs](https://github.com/${repo}/actions/runs/${runId}) |`,
                ``,
                `---`,
                ``,
                `### 🐛 Problem`,
                issue.description,
                ``,
                `---`,
                ``,
                `### 💡 Suggested Fix`,
                issue.suggestion,
                ``,
                `---`,
                ``,
                `### ✅ How to close this`,
                `Fix the problem above and push to main.`,
                `The next scan will skip this issue if the`,
                `fingerprint is no longer matched. Close manually.`,
                ``,
                `_Generated: ${new Date().toUTCString()}_`,
              ].join('\n');

              await github.rest.issues.create({
                owner:  context.repo.owner,
                repo:   context.repo.repo,
                title:  issue.title,
                body:   body,
                labels: labels,
              });

              existingFPs.add(issue.fingerprint);
              created++;
              console.log(`Created: ${issue.title}`);
              await new Promise(r => setTimeout(r, 500));
            }

            console.log(`Done — Created: ${created}, Skipped: ${skipped}`);

      # ── 9. Save source hash ────────────────────────────────────────────
      - name: Save Source Hash
        if: >
          steps.source_hash.outputs.changed == 'true' &&
          env.API_FAILED != 'true'
        run: |
          mkdir -p .github
          echo "${{ steps.source_hash.outputs.hash }}" \
            > .github/last_scan_hash_customer.txt
          git config user.name "github-actions[bot]"
          git config user.email \
            "github-actions[bot]@users.noreply.github.com"
          git add .github/last_scan_hash_customer.txt
          git commit -m "chore: update customer scan hash [skip ci]" \
            || echo "Nothing to commit"
          git push